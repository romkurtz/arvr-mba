<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARVR Israel - Project Roadmap</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 40px 20px;
            color: #fff;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 50px; }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #f093fb, #f5576c, #fda085);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.15rem;
            color: #aaa;
            margin-bottom: 14px;
        }

        .team {
            display: flex;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .team-member {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            color: #c4b5fd;
        }

        .team-member .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.75rem;
            color: #fff;
        }

        .avatar-rk { background: linear-gradient(135deg, #6366f1, #818cf8); }
        .avatar-mb { background: linear-gradient(135deg, #ec4899, #f472b6); }
        .avatar-yj { background: linear-gradient(135deg, #f59e0b, #fbbf24); }

        /* ========== GANTT CHART ========== */
        .gantt-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow-x: auto;
            margin-bottom: 60px;
        }

        .gantt-section h2 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 1.4rem;
            color: #ccc;
        }

        .gantt-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 2px;
            min-width: 960px;
        }

        .gantt-table th {
            padding: 8px 4px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 4px;
        }

        .gantt-table .month-header {
            padding: 8px 4px;
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: 6px 6px 0 0;
        }

        .month-may { background: rgba(99, 102, 241, 0.2); border: 1px solid rgba(99, 102, 241, 0.3); }
        .month-june { background: rgba(236, 72, 153, 0.2); border: 1px solid rgba(236, 72, 153, 0.3); }
        .month-july { background: rgba(245, 158, 11, 0.2); border: 1px solid rgba(245, 158, 11, 0.3); }
        .month-august { background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.3); }

        .gantt-table .week-header {
            background: rgba(255,255,255,0.06);
            color: #999;
        }

        .gantt-table .task-name {
            text-align: left;
            padding: 12px 14px;
            font-size: 0.82rem;
            font-weight: 500;
            white-space: nowrap;
            background: rgba(255,255,255,0.02);
            border-radius: 4px;
            min-width: 300px;
        }

        .gantt-table .task-row:hover .task-name,
        .gantt-table .task-row:hover td {
            background: rgba(255,255,255,0.06);
        }

        .gantt-table td {
            padding: 12px 3px;
            text-align: center;
            border-radius: 3px;
            position: relative;
        }

        .gantt-bar {
            height: 10px;
            border-radius: 5px;
            margin: 0 auto;
            width: 90%;
        }

        .bar-milestone { background: linear-gradient(90deg, #fff, #e2e8f0); box-shadow: 0 0 10px rgba(255,255,255,0.4); }
        .bar-research { background: linear-gradient(90deg, #6366f1, #818cf8); box-shadow: 0 0 8px rgba(99,102,241,0.3); }
        .bar-analysis { background: linear-gradient(90deg, #ec4899, #f472b6); box-shadow: 0 0 8px rgba(236,72,153,0.3); }
        .bar-strategy { background: linear-gradient(90deg, #f59e0b, #fbbf24); box-shadow: 0 0 8px rgba(245,158,11,0.3); }
        .bar-delivery { background: linear-gradient(90deg, #10b981, #34d399); box-shadow: 0 0 8px rgba(16,185,129,0.3); }

        .gantt-table .phase-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        /* ========== LEGEND ========== */
        .legend {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin: 30px 0 50px 0;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #aaa;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        /* ========== TIMELINE ========== */
        .months-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 0 60px;
        }

        .month-pill {
            flex: 1;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 10px 0;
            border-radius: 8px;
            margin: 0 4px;
        }

        .timeline {
            position: relative;
            padding-left: 60px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 28px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, #fff 0%, #6366f1 8%, #ec4899 35%, #f59e0b 62%, #10b981 90%, #fff 100%);
            border-radius: 2px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 22px;
            animation: fadeSlide 0.5s ease forwards;
            opacity: 0;
            transform: translateX(-20px);
        }

        @keyframes fadeSlide {
            to { opacity: 1; transform: translateX(0); }
        }

        .timeline-item:nth-child(1)  { animation-delay: 0.05s; }
        .timeline-item:nth-child(2)  { animation-delay: 0.10s; }
        .timeline-item:nth-child(3)  { animation-delay: 0.15s; }
        .timeline-item:nth-child(4)  { animation-delay: 0.20s; }
        .timeline-item:nth-child(5)  { animation-delay: 0.25s; }
        .timeline-item:nth-child(6)  { animation-delay: 0.30s; }
        .timeline-item:nth-child(7)  { animation-delay: 0.35s; }
        .timeline-item:nth-child(8)  { animation-delay: 0.40s; }
        .timeline-item:nth-child(9)  { animation-delay: 0.45s; }
        .timeline-item:nth-child(10) { animation-delay: 0.50s; }
        .timeline-item:nth-child(11) { animation-delay: 0.55s; }
        .timeline-item:nth-child(12) { animation-delay: 0.60s; }
        .timeline-item:nth-child(13) { animation-delay: 0.65s; }
        .timeline-item:nth-child(14) { animation-delay: 0.70s; }

        .timeline-dot {
            position: absolute;
            left: -44px;
            top: 16px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 3px solid;
            background: #1a1a2e;
        }

        .timeline-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 18px 22px;
            transition: all 0.3s ease;
        }

        .timeline-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-title { font-size: 1rem; font-weight: 600; }

        .task-date {
            font-size: 0.78rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
            white-space: nowrap;
        }

        .phase-research .timeline-dot { border-color: #6366f1; }
        .phase-research .task-date { background: rgba(99, 102, 241, 0.2); color: #a5b4fc; }

        .phase-analysis .timeline-dot { border-color: #ec4899; }
        .phase-analysis .task-date { background: rgba(236, 72, 153, 0.2); color: #f9a8d4; }

        .phase-strategy .timeline-dot { border-color: #f59e0b; }
        .phase-strategy .task-date { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }

        .phase-delivery .timeline-dot { border-color: #10b981; }
        .phase-delivery .task-date { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }

        .phase-milestone .timeline-dot {
            border-color: #fff;
            background: #fff;
            box-shadow: 0 0 12px rgba(255,255,255,0.5);
        }
        .phase-milestone .task-date { background: rgba(255, 255, 255, 0.15); color: #fff; }
        .phase-milestone .timeline-card { border-color: rgba(255,255,255,0.25); }

        .section-title {
            text-align: center;
            font-size: 1.4rem;
            color: #ccc;
            margin-bottom: 30px;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .months-bar { display: none; }
            .timeline { padding-left: 40px; }
            .timeline-dot { left: -32px; }
            .card-header { flex-direction: column; align-items: flex-start; gap: 6px; }
            .gantt-section { padding: 15px; }
            .team { gap: 16px; }
        }

        /* ========== BACK TO HOME BUTTON ========== */
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 999px;
            color: #c4b5fd;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }

        .home-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
            transform: translateX(-2px);
        }

        .home-btn svg {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="home-btn" aria-label="Back to home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5"/>
                <path d="M12 19l-7-7 7-7"/>
            </svg>
            <span>Back to home</span>
        </a>
        <!-- ============ HEADER ============ -->
        <div class="header">
            <h1>ARVR Israel</h1>
            <p class="subtitle">Healthcare AR/VR Market Entry Strategy &mdash; Project Roadmap</p>
            <div class="team">
                <div class="team-member">
                    <div class="avatar avatar-rk">RK</div>
                    <span>Rom Kurtz</span>
                </div>
                <div class="team-member">
                    <div class="avatar avatar-mb">MB</div>
                    <span>Maayan Bohak</span>
                </div>
                <div class="team-member">
                    <div class="avatar avatar-yj">YJ</div>
                    <span>Yoni Jacobs</span>
                </div>
            </div>
        </div>

        <!-- ============ GANTT CHART (FIRST) ============ -->
        <div class="gantt-section">
            <h2>Project Gantt Chart</h2>
            <table class="gantt-table" id="gantt-table">
                <thead>
                    <tr>
                        <th></th>
                        <th class="month-header month-may" colspan="4">May</th>
                        <th class="month-header month-june" colspan="4">June</th>
                        <th class="month-header month-july" colspan="5">July</th>
                        <th class="month-header month-august" colspan="4">August</th>
                    </tr>
                    <tr>
                        <th></th>
                        <th class="week-header">1</th><th class="week-header">2</th><th class="week-header">3</th><th class="week-header">4</th>
                        <th class="week-header">1</th><th class="week-header">2</th><th class="week-header">3</th><th class="week-header">4</th>
                        <th class="week-header">1</th><th class="week-header">2</th><th class="week-header">3</th><th class="week-header">4</th><th class="week-header">5</th>
                        <th class="week-header">1</th><th class="week-header">2</th><th class="week-header">3</th><th class="week-header">4</th>
                    </tr>
                </thead>
                <tbody id="gantt-body"></tbody>
            </table>
        </div>

        <!-- ============ LEGEND ============ -->
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#fff; border:1px solid #666;"></div> Milestone</div>
            <div class="legend-item"><div class="legend-dot" style="background:#6366f1;"></div> Research</div>
            <div class="legend-item"><div class="legend-dot" style="background:#ec4899;"></div> Analysis</div>
            <div class="legend-item"><div class="legend-dot" style="background:#f59e0b;"></div> Strategy</div>
            <div class="legend-item"><div class="legend-dot" style="background:#10b981;"></div> Delivery</div>
        </div>

        <!-- ============ TIMELINE (SECOND) ============ -->
        <h2 class="section-title">Timeline View</h2>

        <div class="months-bar">
            <div class="month-pill month-may">May</div>
            <div class="month-pill month-june">June</div>
            <div class="month-pill month-july">July</div>
            <div class="month-pill month-august">August</div>
        </div>

        <div class="timeline" id="timeline"></div>
    </div>

    <script>
        const TOTAL_WEEKS = 17;

        const tasks = [
            { name: "Kick off meeting",                                                                       weeks: [1],         phase: "milestone", date: "May &mdash; Week 1" },
            { name: "Reading materials",                                                                      weeks: [2],         phase: "research",  date: "May &mdash; Week 2" },
            { name: "Market research &mdash; US market focus, UAE and other",                                  weeks: [3, 4],      phase: "research",  date: "May &mdash; Weeks 3&ndash;4" },
            { name: "Competitor analysis &mdash; solo assignment",                                             weeks: [5, 6],      phase: "analysis",  date: "June &mdash; Weeks 1&ndash;2" },
            { name: "Company audit &mdash; SWOT analysis for ARVR and competitors",                           weeks: [6],         phase: "analysis",  date: "June &mdash; Week 2" },
            { name: "Vertical selection &mdash; choose specific healthcare vertical",                         weeks: [7, 8],      phase: "analysis",  date: "June &mdash; Weeks 3&ndash;4" },
            { name: "Define value proposition for selected vertical",                                         weeks: [9],         phase: "strategy",  date: "July &mdash; Week 1" },
            { name: "Search for leading persons and institutions",                                            weeks: [10, 11],    phase: "strategy",  date: "July &mdash; Weeks 2&ndash;3" },
            { name: "Suggest strategic partnerships",                                                         weeks: [12],        phase: "strategy",  date: "July &mdash; Week 4" },
            { name: "Go to market strategy",                                                                  weeks: [13,14,15],  phase: "strategy",  date: "Jul W5 &ndash; Aug W2" },
            { name: "Risk assessment for GTM strategy",                                                       weeks: [15],        phase: "delivery",  date: "August &mdash; Week 2" },
            { name: "Detailed plan for implementation over next year",                                        weeks: [15],        phase: "delivery",  date: "August &mdash; Week 2" },
            { name: "Present first draft and review",                                                         weeks: [16],        phase: "delivery",  date: "August &mdash; Week 3" },
            { name: "Final project presentation",                                                             weeks: [17],        phase: "milestone", date: "August &mdash; Week 4" },
        ];

        const phaseColors = {
            milestone: { bar: "bar-milestone", dot: "#ffffff" },
            research:  { bar: "bar-research",  dot: "#6366f1" },
            analysis:  { bar: "bar-analysis",  dot: "#ec4899" },
            strategy:  { bar: "bar-strategy",  dot: "#f59e0b" },
            delivery:  { bar: "bar-delivery",  dot: "#10b981" },
        };

        // ========== RENDER GANTT ==========
        const ganttBody = document.getElementById("gantt-body");

        tasks.forEach(task => {
            const tr = document.createElement("tr");
            tr.className = "task-row";

            const nameTd = document.createElement("td");
            nameTd.className = "task-name";
            const dot = document.createElement("span");
            dot.className = "phase-dot";
            dot.style.background = phaseColors[task.phase].dot;
            nameTd.appendChild(dot);
            nameTd.appendChild(document.createTextNode(task.name.replace(/&mdash;/g, "\u2014").replace(/&ndash;/g, "\u2013")));
            tr.appendChild(nameTd);

            for (let w = 1; w <= TOTAL_WEEKS; w++) {
                const td = document.createElement("td");
                if (task.weeks.includes(w)) {
                    const bar = document.createElement("div");
                    bar.className = "gantt-bar " + phaseColors[task.phase].bar;
                    td.appendChild(bar);
                }
                tr.appendChild(td);
            }

            ganttBody.appendChild(tr);
        });

        // ========== RENDER TIMELINE ==========
        const timeline = document.getElementById("timeline");

        const phaseClasses = {
            milestone: "phase-milestone",
            research: "phase-research",
            analysis: "phase-analysis",
            strategy: "phase-strategy",
            delivery: "phase-delivery",
        };

        tasks.forEach(task => {
            const item = document.createElement("div");
            item.className = "timeline-item " + phaseClasses[task.phase];

            const cleanName = task.name.replace(/&mdash;/g, "\u2014").replace(/&ndash;/g, "\u2013");

            item.innerHTML = `
                <div class="timeline-dot"></div>
                <div class="timeline-card">
                    <div class="card-header">
                        <span class="task-title">${cleanName}</span>
                        <span class="task-date">${task.date}</span>
                    </div>
                </div>
            `;
            timeline.appendChild(item);
        });
    </script>
</body>
</html>
